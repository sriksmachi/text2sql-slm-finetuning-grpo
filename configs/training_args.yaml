# HuggingFace TrainingArguments / TRL GRPOTrainer settings

output_dir: "./outputs/grpo_checkpoints"
run_name: "text2sql-grpo"

# Batch sizes
# Must satisfy: per_device_train_batch_size * gradient_accumulation_steps * world_size % num_generations == 0
# Effective batch = 9 * 3 * 1 = 27; 27 % 9 (num_generations) = 0
per_device_train_batch_size: 9
per_device_eval_batch_size: 3
gradient_accumulation_steps: 3

# Learning rate schedule
learning_rate: 2.0e-5
lr_scheduler_type: "cosine"
warmup_ratio: 0.05

# Training length
num_train_epochs: 3
max_steps: -1

# Precision
bf16: false
fp16: false

# Checkpointing
save_strategy: "steps"
save_steps: 25
save_total_limit: 10
evaluation_strategy: "steps"
eval_steps: 25
load_best_model_at_end: true

# Logging
logging_steps: 5
report_to: "none" # Set to "azure_ml" at runtime if MLflow is enabled, otherwise "none" to disable reporting

# Optimizer
optim: "adamw_8bit"
weight_decay: 0.01
max_grad_norm: 1.0

# Data
# Azure ML containers have fork/shared-memory limits; 2 is the safe ceiling
dataloader_num_workers: 2
remove_unused_columns: false

# Misc
seed: 42
data_seed: 42
