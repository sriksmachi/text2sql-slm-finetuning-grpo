# HuggingFace TrainingArguments / TRL GRPOTrainer settings

output_dir: "./outputs/grpo_checkpoints"
run_name: "text2sql-grpo"

# Batch sizes
# Must satisfy: per_device_train_batch_size * gradient_accumulation_steps * world_size % num_generations == 0
# Effective batch = 4 * 4 * 1 = 16 completions = 4 prompts/update; 16 % 4 (num_generations) = 0
# Reduced gradient_accumulation_steps from 32 → 4 to cut the ~5 h/epoch wall-clock time by ~8x.
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4

# Learning rate schedule
learning_rate: 2.0e-5
lr_scheduler_type: "cosine"
warmup_ratio: 0.10

# Training length
# 2 epochs is sufficient for GRPO policy improvement and cuts wall-clock time by ~60%.
num_train_epochs: 5
max_steps: -1

# Precision
# Standard_NC24ads_A100_v4 uses an A100 80 GB (compute capability 8.0) which has
# native BF16 Tensor Cores. BF16 is preferred over FP16: wider dynamic range,
# no gradient scaling needed, and required by vLLM fast inference.
bf16: true
fp16: false

# Checkpointing
save_strategy: "steps"
save_steps: 25
save_total_limit: 3          # keep only the 3 best checkpoints by eval metric
evaluation_strategy: "steps"
eval_steps: 25
load_best_model_at_end: true
metric_for_best_model: "eval_loss"  # swap for a reward metric once exposed
greater_is_better: false

# Logging
logging_steps: 1
report_to: "none" # Set to "azure_ml" at runtime if MLflow is enabled, otherwise "none" to disable reporting

# Optimizer
optim: "adamw_8bit"
weight_decay: 0.01
max_grad_norm: 1.0

# Data
# Azure ML containers have fork/shared-memory limits; 2 is the safe ceiling
dataloader_num_workers: 2
remove_unused_columns: false

# Misc
seed: 42
data_seed: 42
