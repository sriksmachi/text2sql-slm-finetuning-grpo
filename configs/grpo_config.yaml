# GRPO algorithm configuration
# All values here mirror TRL GRPOConfig fields

model:
  name_or_path: "unsloth/Qwen2.5-3B-Instruct"
  torch_dtype: "float16"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  lora_rank: 32
  fast_inference: auto
  gpu_memory_utilization: 0.9
  random_state: 3407

grpo:
  # Number of rollout samples per prompt
  num_generations: 3
  # Max tokens to generate during rollout
  # SQL queries are short; metrics show mean terminated length ~200 tokens.
  # Keeping this at 512 avoids prompt truncation and reduces clipping ratio.
  max_completion_length: 512
  # Temperature for sampling
  temperature: 0.8
  # KL penalty coefficient
  beta: 0.04
  # Clip range for the policy ratio
  epsilon: 0.2
  # Number of PPO-style update steps per batch
  num_iterations: 1
  # Use DAPO loss (clip-higher variant)
  use_dapo: false
  # Use Ablation mode (for testing with smaller datasets and faster iterations)
  ablation: false
  
tokenizer:
  # Must be large enough to hold prompt + completion without truncation.
  # Prompts with large schemas tokenize to ~2560 tokens; with max_completion_length=512
  # the total reaches ~3072, so 4096 provides safe headroom.
  max_length: 4096
  truncation_side: "left"
  padding_side: "left"

reward:
  # Weights file location (overridden at runtime)
  weights_file: "configs/reward_weights.yaml"
