$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json

type: pipeline
display_name: text2sql-grpo-train-eval
description: >
  GRPO training + evaluation pipeline.
  Consumes a pre-registered csv_splits dataset produced by prep_data.ps1.
  Run prep_data.ps1 once to prepare the data, then supply the printed
  dataset ID via --set inputs.csv_splits.path=azureml:<name>:<version>.
experiment_name: text2sql-grpo

# ---------------------------------------------------------------------------
# Pipeline-level inputs
# ---------------------------------------------------------------------------
inputs:
  # Registered dataset ID; override on the CLI with:
  #   --set inputs.csv_splits.path=azureml:text2sql-grpo-splits:1
  csv_splits:
    type: uri_folder
    path: azureml:text2sql-grpo-splits:latest

  # Raw databases (Spider + BIRD .sqlite files) used by exec_reward during training.
  # Override with: --set inputs.rawdata_dir.path=azureml:<rawdata-asset>:<version>
  rawdata_dir:
    type: uri_folder
    path: azureml:text2sql-grpo-rawdata:latest

  # Evaluation hyper-parameters
  temperature: 0.7
  top_p: 1.0
  max_tokens: 512

# ---------------------------------------------------------------------------
# Pipeline-level outputs
# ---------------------------------------------------------------------------
outputs:
  eval_results:
    type: uri_folder

# ---------------------------------------------------------------------------
# Steps
# ---------------------------------------------------------------------------
jobs:
  # ── Step 1 : GRPO training ───────────────────────────────────────────────
  grpo_train:
    type: command
    compute: azureml:gpu-cluster-2
    component:
      type: command
      code: ../../
      environment: azureml:text2sql-grpo-env@latest
      distribution:
        type: pytorch
        process_count_per_instance: 1  # increase to match GPU count when scaling to multi-GPU
      environment_variables:
        VLLM_USE_FLASHINFER_SAMPLER: "0"
        VLLM_USE_V1: "0"  # vLLM V1 Flash Attn backend raises AoT scheduling error on A100 + Unsloth; V0 engine works correctly
        RAWDATA_DIR: ${{inputs.rawdata_dir}}  # rewards.py exec_reward resolves SQLite paths via this env var
        PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:512"  # Disables expandable_segments which conflicts with Unsloth vLLM standby mode
      command: >-
        python src/grpo_trainer.py
        --config configs/grpo_config.yaml
        --training-args configs/training_args.yaml
        --reward-weights configs/reward_weights.yaml
        --train-data ${{inputs.csv_splits}}/train.csv
        --val-data ${{inputs.csv_splits}}/val.csv
        --output-dir ${{outputs.model_dir}}
        --lora-dir ${{outputs.lora_dir}}
      inputs:
        csv_splits:
          type: uri_folder
        rawdata_dir:
          type: uri_folder
      outputs:
        model_dir:
          type: uri_folder
        lora_dir:
          type: uri_folder
    inputs:
      csv_splits: ${{parent.inputs.csv_splits}}
      rawdata_dir: ${{parent.inputs.rawdata_dir}}
    outputs:
      model_dir:
        type: uri_folder
        mode: rw_mount
      lora_dir:
        type: uri_folder
        mode: rw_mount

  # ── Step 2 : Evaluation ──────────────────────────────────────────────────
  eval:
    type: command
    display_name: evaluation
    compute: azureml:gpu-cluster-2
    component:
      type: command
      code: ../../
      environment: azureml:text2sql-grpo-env@latest
      command: >-
        python src/evaluator.py
        --config configs/grpo_config.yaml
        --lora-path ${{inputs.lora_dir}}
        --test-data ${{inputs.csv_splits}}/test.csv
        --eval-results ${{outputs.eval_results}}
        --temperature ${{inputs.temperature}}
        --top-p ${{inputs.top_p}}
        --max-tokens ${{inputs.max_tokens}}
      inputs:
        model_dir:
          type: uri_folder
        lora_dir:
          type: uri_folder
        csv_splits:
          type: uri_folder
        temperature:
          type: number
        top_p:
          type: number
        max_tokens:
          type: integer
      outputs:
        eval_results:
          type: uri_folder
    inputs:
      model_dir:   ${{parent.jobs.grpo_train.outputs.model_dir}}
      lora_dir:    ${{parent.jobs.grpo_train.outputs.lora_dir}}
      csv_splits:  ${{parent.inputs.csv_splits}}
      temperature: ${{parent.inputs.temperature}}
      top_p:       ${{parent.inputs.top_p}}
      max_tokens:  ${{parent.inputs.max_tokens}}
    outputs:
      eval_results: ${{parent.outputs.eval_results}}
