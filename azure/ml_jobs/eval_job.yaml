$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

type: command
display_name: text2sql-evaluation
description: Evaluate the GRPO fine-tuned model on the held-out test split and log metrics to MLflow.
experiment_name: text2sql-grpo

code: ../../

environment: azureml:text2sql-grpo-env@latest

compute: azureml:gpu-cluster-2  # Standard_NC12s_v3 – vLLM inference requires GPU

command: >-
  python src/evaluator.py
  --config configs/grpo_config.yaml
  --lora-path ${{inputs.model_dir}}/grpo_saved_lora
  --test-data ${{inputs.test_data}}
  --eval-results ${{outputs.eval_results}}
  --temperature ${{inputs.temperature}}
  --top-p ${{inputs.top_p}}
  --max-tokens ${{inputs.max_tokens}}
  --log-level DEBUG

inputs:
  model_dir:
    type: uri_folder
    path: "" # set at runtime from grpo_train outputs
    mode: ro_mount
  test_data:
    type: uri_file
    path: "" # set at runtime from data_prep outputs
    mode: ro_mount
  rawdata_dir:
    type: uri_folder
    path: "" # set at runtime from data_prep outputs
    mode: ro_mount
  temperature: 0.7
  top_p: 1.0
  max_tokens: 512

outputs:
  eval_results:
    type: uri_folder
    mode: rw_mount
