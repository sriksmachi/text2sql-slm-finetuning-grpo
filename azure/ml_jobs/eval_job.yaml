$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

type: command
display_name: text2sql-evaluation
description: Evaluate the GRPO fine-tuned model on the held-out test split and log metrics to MLflow.
experiment_name: text2sql-grpo

code: ../../

environment: azureml:text2sql-grpo-env@latest

compute: azureml:gpu-cluster-2  # Standard_NC12s_v3 – vLLM inference requires GPU

command: >-
  python src/evaluator.py
  --config configs/grpo_config.yaml
  --lora-path ${{inputs.model_dir}}
  --test-data ${{inputs.test_data}}/test.csv
  --eval-results ${{outputs.eval_results}}
  --top-p ${{inputs.top_p}}
  --log-level DEBUG

inputs:
  model_dir:
    type: uri_folder
    path: azureml:azureml_be59c12c-6698-4dc9-bbb4-3b4908019ef7_output_data_lora_dir:1
    mode: ro_mount
  test_data:
    type: uri_folder
    path: azureml:text2sql-grpo-splits:3
    mode: ro_mount
  rawdata_dir:
    type: uri_folder
    path: azureml:text2sql-grpo-rawdata:1
    mode: ro_mount
  top_p: 1.0
  # temperature and max_tokens intentionally omitted – evaluator reads them
  # from grpo_config.yaml so eval conditions match training exactly.

outputs:
  eval_results:
    type: uri_folder
    mode: rw_mount
