$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

type: command
display_name: text2sql-grpo-training
description: Fine-tune unsloth/Qwen2.5-3B-Instruct with GRPO using Unsloth + TRL on the Spider/BIRD training split.
experiment_name: text2sql-grpo

code: ../../

environment: azureml:text2sql-grpo-env@latest

compute: azureml:gpu-cluster-2  # Standard_NC24ads_A100_v4 (1 × A100 40 GB)

# The rawdata_dir is bind-mounted and its path exposed via TEXT2SQL_RAWDATA_DIR
# so that exec_reward can locate the SQLite databases at runtime.
environment_variables:
  TEXT2SQL_RAWDATA_DIR: ${{inputs.rawdata_dir}}
  VLLM_USE_FLASHINFER_SAMPLER: "0"

command: >-
  python src/grpo_trainer.py
  --config configs/grpo_config.yaml
  --training-args configs/training_args.yaml
  --reward-weights configs/reward_weights.yaml
  --train-data ${{inputs.csv_splits}}/train.csv
  --val-data ${{inputs.csv_splits}}/val.csv
  --output-dir ${{outputs.model_dir}}
  --log-level DEBUG

inputs:
  csv_splits:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/azureml/polite_roti_k9sfyg4c7z/csv_splits/
    mode: ro_mount
  rawdata_dir:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/azureml/polite_roti_k9sfyg4c7z/rawdata_dir/
    mode: ro_mount

outputs:
  model_dir:
    type: uri_folder
    mode: rw_mount
