$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

type: command
display_name: text2sql-data-preparation
description: Download Spider/BIRD datasets, serialize schemas, and produce train/val/test CSV prompt-record splits.
experiment_name: text2sql-grpo

code: ../../  # repo root – entire workspace is uploaded; scripts live in src/

environment: azureml:text2sql-grpo-env@latest

compute: azureml:cpu-cluster  # data download is CPU-only

command: >-
  python src/data_preparation.py
  --rawdata-dir ${{outputs.rawdata_dir}}
  --serialized-dir ${{outputs.serialized_schemas}}
  --splits-dir ${{outputs.csv_splits}}
  --sample-size ${{inputs.sample_size}}
  --train-ratio ${{inputs.train_ratio}}
  --val-ratio ${{inputs.val_ratio}}
  --seed ${{inputs.seed}}

inputs:
  sample_size: -1 # -1 means "use all available data"; min = 8. Default is 400, which is a good balance for development and testing. For final runs, consider using -1 to leverage the full dataset.
  train_ratio: 0.7
  val_ratio: 0.15
  seed: 42

outputs:
  rawdata_dir:
    type: uri_folder
    mode: rw_mount
  serialized_schemas:
    type: uri_folder
    mode: rw_mount
  csv_splits:
    type: uri_folder
    mode: rw_mount
