$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline

display_name: text2sql-grpo-pipeline
experiment_name: text2sql-grpo-pipeline
description: "End-to-end Text-to-SQL GRPO pipeline: data prep → training → evaluation."

settings:
  default_compute: azureml:gpu-cluster-dev
  default_datastore: azureml:workspaceblobstore
  continue_on_step_failure: false

inputs:
  mlflow_tracking_uri:
    type: string
    default: "azureml://..."

jobs:
  data_prep:
    type: command
    code: ../../data/prep
    command: >-
      python download_spider_bird.py --output-dir ${{outputs.raw_data}} &&
      python serialize_schemas.py
        --input-dir ${{outputs.raw_data}}
        --output-dir ${{outputs.serialized_schemas}} &&
      python schema_split.py
        --input-dir ${{outputs.serialized_schemas}}
        --output-dir ${{outputs.split_data}}
        --train-ratio 0.8
        --val-ratio 0.1
    environment:
      image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
      conda_file: ../environments/conda_env.yml
    outputs:
      raw_data:
        type: uri_folder
        mode: rw_mount
      serialized_schemas:
        type: uri_folder
        mode: rw_mount
      split_data:
        type: uri_folder
        mode: upload

  grpo_train:
    type: command
    code: ../../src
    command: >-
      python grpo_trainer.py
        --config ../../configs/grpo_config.yaml
        --training-args ../../configs/training_args.yaml
        --reward-weights ../../configs/reward_weights.yaml
        --train-data ${{inputs.train_data}}
        --val-data ${{inputs.val_data}}
        --output-dir ${{outputs.model_checkpoint}}
        --mlflow-tracking-uri ${{inputs.mlflow_tracking_uri}}
    environment: azureml:text2sql-unsloth-trl@latest
    inputs:
      train_data: ${{parent.jobs.data_prep.outputs.split_data}}
      val_data: ${{parent.jobs.data_prep.outputs.split_data}}
      mlflow_tracking_uri: ${{parent.inputs.mlflow_tracking_uri}}
    outputs:
      model_checkpoint:
        type: uri_folder
        mode: upload
    resources:
      instance_count: 1
    distribution:
      type: pytorch
      process_count_per_instance: 1

  evaluate:
    type: command
    code: ../../src
    command: >-
      python evaluator.py
        --model-dir ${{inputs.model_checkpoint}}
        --test-data ${{inputs.test_data}}
        --output-dir ${{outputs.eval_results}}
        --mlflow-tracking-uri ${{inputs.mlflow_tracking_uri}}
        --dialects sqlite postgresql
    environment: azureml:text2sql-unsloth-trl@latest
    inputs:
      model_checkpoint: ${{parent.jobs.grpo_train.outputs.model_checkpoint}}
      test_data: ${{parent.jobs.data_prep.outputs.split_data}}
      mlflow_tracking_uri: ${{parent.inputs.mlflow_tracking_uri}}
    outputs:
      eval_results:
        type: uri_folder
        mode: upload
