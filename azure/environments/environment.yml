# environment.yml – Azure ML Environment definition for Text-to-SQL GRPO.
#
# Register this environment once before submitting any jobs:
#
#   az ml environment create \
#     --file azure/environments/environment.yml \
#     --resource-group <rg> \
#     --workspace-name <workspace>
#
# After registration the environment is referenced in job YAMLs as:
#   environment: azureml:text2sql-grpo-env@latest

$schema: https://azuremlschemas.azureedge.net/latest/environment.schema.json

name: text2sql-grpo-env
version: "1"
description: >
  GPU environment for Text-to-SQL GRPO fine-tuning.
  Based on CUDA 12.1 + cuDNN 8 with PyTorch 2.4, Unsloth, vLLM, and TRL.

# Azure ML curated base image with CUDA 12.1 and OpenMPI
# (pre-installed: CUDA runtime, cuDNN, NCCL, OpenMPI)
image: mcr.microsoft.com/azureml/openmpi4.1.0-cuda12.1-cudnn8-ubuntu22.04:latest

conda_file: conda_env.yml

tags:
  framework: unsloth
  cuda: "12.1"
  python: "3.11"
  task: text2sql-grpo
