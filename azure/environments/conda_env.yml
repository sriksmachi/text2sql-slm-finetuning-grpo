# conda_env.yml – Conda environment for Text-to-SQL GRPO training on Azure ML.
#
# Base Docker image:
#   mcr.microsoft.com/azureml/openmpi4.1.0-cuda11.8-cudnn8-ubuntu22.04
# (specified in environment.yml)
#
# GPU target: NVIDIA A100 (40 GB) or V100 (16 GB)
# CUDA:       11.8   Torch: 2.4.x

name: text2sql-grpo
channels:
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # ── PyTorch (CUDA 11.8 wheel) ──────────────────────────────────────────
    - torch
    - torchvision
    - torchaudio
    - --extra-index-url https://download.pytorch.org/whl/cu118

    # ── Unsloth runtime ────────────────────────────────────────────────────
    - vllm
    - triton
    - unsloth

    # ── HuggingFace stack ──────────────────────────────────────────────────
    - transformers
    - accelerate
    - peft
    - bitsandbytes
    - trl
    - datasets
    - huggingface_hub

    # ── SQL tooling ────────────────────────────────────────────────────────
    - sqlglot
    - sqlparse

    # ── Azure / MLflow ─────────────────────────────────────────────────────
    - mlflow
    - azureml-mlflow
    - azure-ai-ml
    - azure-identity
    - openai

    # ── Data / compute ─────────────────────────────────────────────────────
    - pandas
    - pyarrow
    - numpy
    - tqdm
    - requests

    # ── Config / logging ───────────────────────────────────────────────────
    - pyyaml
    - loguru
    - pydantic
