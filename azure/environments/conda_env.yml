# conda_env.yml – Conda environment for Text-to-SQL GRPO training on Azure ML.
#
# Base Docker image:
#   mcr.microsoft.com/azureml/openmpi4.1.0-cuda11.8-cudnn8-ubuntu22.04
# (specified in environment.yml)
#
# GPU target: NVIDIA A100 (40 GB) or V100 (16 GB)
# CUDA:       11.8   Torch: 2.4.x

name: text2sql-grpo
channels:
  - defaults
dependencies:
  - python=3.12.12
  - pip
  - pip:
    # ── PyTorch (CUDA 11.8 wheel) ──────────────────────────────────────────
    - torch==2.7.0
    - torchvision
    - torchaudio

    # ── Unsloth runtime ────────────────────────────────────────────────────
    - vllm==0.9.2
    - triton>=3.2.0
    - unsloth

    # ── HuggingFace stack ──────────────────────────────────────────────────
    - transformers==4.56.2
    - accelerate
    - peft
    - bitsandbytes
    - trl==0.22.2
    - datasets==4.3.0
    - huggingface_hub>=0.34.0

    # ── SQL tooling ────────────────────────────────────────────────────────
    - sqlglot
    - sqlparse

    # ── Azure / MLflow ─────────────────────────────────────────────────────
    - mlflow
    - azureml-mlflow
    - azure-ai-ml
    - azure-identity
    - openai

    # ── Data / compute ─────────────────────────────────────────────────────
    - pandas
    - pyarrow
    - numpy
    - tqdm
    - requests

    # ── Config / logging ───────────────────────────────────────────────────
    - pyyaml
    - loguru
    - pydantic
