# conda_env.yml – Conda environment for Text-to-SQL GRPO training on Azure ML.
#
# Base Docker image:
#   nvcr.io/nvidia/cuda:12.6.3-cudnn-devel-ubuntu22.04
# (specified in Dockerfile)
#
# GPU target: NVIDIA A100 80 GB (Standard_NC24ads_A100_v4)
# CUDA:       12.6   Torch: 2.7.0+cu126

name: text2sql-grpo
channels:
  - conda-forge   # open channel, no ToS required
  - defaults
dependencies:
  - python=3.12.12
  - pip
  - pip:
    # ── PyTorch (CUDA 12.6 wheel) ─────────────────────────────────────────
    - torch==2.7.0
    - torchvision
    - torchaudio

    # ── Unsloth runtime ────────────────────────────────────────────────────
    - vllm==0.9.2
    - triton>=3.2.0
    - unsloth

    # ── HuggingFace stack ──────────────────────────────────────────────────
    - transformers==4.56.2
    - accelerate
    - peft
    - bitsandbytes
    - trl==0.22.2
    - datasets==4.3.0
    - huggingface_hub>=0.34.0

    # ── SQL tooling ────────────────────────────────────────────────────────
    - sqlglot
    - sqlparse

    # ── Azure / MLflow ─────────────────────────────────────────────────────
    - mlflow
    - azureml-mlflow
    - azure-ai-ml
    - azure-identity
    - openai

    # ── Data / compute ─────────────────────────────────────────────────────
    - pandas
    - pyarrow
    - numpy
    - tqdm
    - requests

    # ── Config / logging ───────────────────────────────────────────────────
    - pyyaml
    - loguru
    - pydantic
